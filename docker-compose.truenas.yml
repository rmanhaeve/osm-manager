version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=osm_manager
    command:
      - postgres
      - -c
      - checkpoint_timeout=15min
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=4GB
      - -c
      - min_wal_size=1GB
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /mnt/pool/appdata/osm_mgr/data:/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    restart: unless-stopped

  api:
    image: ghcr.io/rmanhaeve/osm-manager/backend:latest
    depends_on:
      - postgres
      - redis
    environment:
      - ENVIRONMENT=production
      - OSM_MANAGER__API_HOST=0.0.0.0
      - OSM_MANAGER__API_PORT=8000
      - OSM_MANAGER__DATABASE__PRIMARY_DSN=postgresql+psycopg://app_user:app_password@postgres:5432/osm_manager
      - OSM_MANAGER__DATABASE__ADMIN_DSN=postgresql+psycopg://super_user:super_password@postgres:5432/postgres
      - OSM_MANAGER__REDIS__URL=redis://redis:6379/0
      - OSM_MANAGER__CELERY__BROKER_URL=redis://redis:6379/0
      - OSM_MANAGER__CELERY__RESULT_BACKEND=redis://redis:6379/1
      - OSM_MANAGER__FILESYSTEM_ROOT=/data
      - OSM_MANAGER__SECURITY__ADMIN_API_TOKEN=change-me-in-production
    volumes:
      - /mnt/pool/appdata/osm_mgr/data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    image: ghcr.io/rmanhaeve/osm-manager/backend:latest
    depends_on:
      - api
    entrypoint:
      - ./scripts/docker-entrypoint.sh
    command:
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
    environment:
      - ENVIRONMENT=production
      - OSM_MANAGER__DATABASE__PRIMARY_DSN=postgresql+psycopg://app_user:app_password@postgres:5432/osm_manager
      - OSM_MANAGER__DATABASE__ADMIN_DSN=postgresql+psycopg://super_user:super_password@postgres:5432/postgres
      - OSM_MANAGER__REDIS__URL=redis://redis:6379/0
      - OSM_MANAGER__CELERY__BROKER_URL=redis://redis:6379/0
      - OSM_MANAGER__CELERY__RESULT_BACKEND=redis://redis:6379/1
      - OSM_MANAGER__FILESYSTEM_ROOT=/data
    volumes:
      - /mnt/pool/appdata/osm_mgr/data:/data
    restart: unless-stopped

  beat:
    image: ghcr.io/rmanhaeve/osm-manager/backend:latest
    depends_on:
      - worker
    entrypoint:
      - ./scripts/docker-entrypoint.sh
    command:
      - celery
      - -A
      - app.workers.celery_app
      - beat
      - --loglevel=info
    environment:
      - ENVIRONMENT=production
      - OSM_MANAGER__DATABASE__PRIMARY_DSN=postgresql+psycopg://app_user:app_password@postgres:5432/osm_manager
      - OSM_MANAGER__DATABASE__ADMIN_DSN=postgresql+psycopg://super_user:super_password@postgres:5432/postgres
      - OSM_MANAGER__REDIS__URL=redis://redis:6379/0
      - OSM_MANAGER__CELERY__BROKER_URL=redis://redis:6379/0
      - OSM_MANAGER__CELERY__RESULT_BACKEND=redis://redis:6379/1
      - OSM_MANAGER__FILESYSTEM_ROOT=/data
    volumes:
      - /mnt/pool/appdata/osm_mgr/data:/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/rmanhaeve/osm-manager/frontend:latest
    depends_on:
      - api
    environment:
      - VITE_API_BASE_URL=http://api:8000
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
